<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students Profile</title>
    <style>
        body {
            background-color: #efefefba;
        }

        .heading {
            text-align: center;
            font-size: 2em;
            font-weight: 300;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .students-profile-div {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            row-gap: 30px;
            column-gap: 10px;
            justify-items: center;
            margin: 20px 40px;
        }

        .student {
            background-color: #fff;
            width: 200px;
            border-radius: 10px;
            transition: all 0.25s ease;

            &:hover {
                transform: translateY(-6px);
                box-shadow: 0px 10px 30px #a4a4a4;
            }
        }

        .student-picture-img {
            width: 200px;
            border-radius: 10px 10px 0 0;
        }

        .student-details {
            display: flex;
            flex-direction: column;
            gap: 0px;
        }

        .student-id,
        .student-name,
        .student-major,
        .student-status {
            margin: 4px;
        }

        .student-id {
            font-size: 1em;
        }

        .student-name,
        .student-major,
        .student-status {
            font-size: 0.8em;
            color: #565656;
        }
    </style>
</head>

<body>
    <h1 class="heading">Students Profile</h1>
    <div class="students-profile-div js-students-profile-div">

    </div>
    </div>

    <script>
        const students = [];

        class Student {
            constructor(id, name, major, status) {
                this.id = id,
                this.name = name,
                this.major = major,
                this.status = status
            }
        }

        students.push(new Student('S001', 'Hamim', 'Science', 'Dropped out'));
        students.push(new Student('S002', 'Muti', 'Science', 'Employed'));
        students.push(new Student('S003', 'Tanti', 'Science', 'Studying'));
        students.push(new Student('S004', 'Dilla', 'Science', 'Employed'));
        students.push(new Student('S005', 'Ana', 'Science', 'unknown'));
        students.push(new Student('S006', 'Rakib', 'Arts', 'Employed'));
        students.push(new Student('S007', 'Pial', 'Arts', 'Graduated'));
        students.push(new Student('S008', 'Sabit', 'Commerce', 'Failed'));
        students.push(new Student('S009', 'Akash', 'Commerce', 'Failed'));
        students.push(new Student('S010', 'Joy', 'Arts', 'Graduated'));
        students.push(new Student('S011', 'David', 'Science', 'Failed'));
        students.push(new Student('S012', 'Fred', 'Science', 'Failed'));
        students.push(new Student('S013', 'Nat', 'Science', 'Married'));
        students.push(new Student('S014', 'Jeff', 'Commerce', 'Billionare'));
        students.push(new Student('S015', 'Elon', 'Science', 'Billionare'));
        students.push(new Student('S016', 'Groot', 'Arts', 'unknown'));
        students.push(new Student('S017', 'Thanos', 'Unknown', 'Dead'));

        const studentsProfile = document.querySelector('.js-students-profile-div');

        function displayStudents() {
            students.forEach((student) => {
                studentsProfile.innerHTML += `
                <div class="student">
            <img src="/javascript-supersimpledev/assets/profile-avatar.jpg" alt="student" class="student-picture-img">
            <div class="student-details">
                <p class="student-id">ID: ${student.id}</p>
                <p class="student-name">Name: ${student.name}</p>
                <p class="student-major">Major: ${student.major}</p>
                <p class="student-status">Status: ${student.status}</p>
            </div>
            `;;
            });
        }

        displayStudents();
    </script>
</body>

</html>
